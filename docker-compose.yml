services:
  api:
    image: ghcr.io/kounex/ingame-api:local
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      INGAME_DATABASE_URL: postgresql+asyncpg://ingame:ingame@postgres:5432/ingame
      INGAME_REDIS_URL: redis://redis:6379
      INGAME_DISCORD_CLIENT_ID: ${INGAME_DISCORD_CLIENT_ID:-}
      INGAME_APPLE_CLIENT_IDS: ingame.kounex.com,com.kounex.ingame.web
      INGAME_DEBUG: "true"
      INGAME_AVATAR_STORAGE_BUCKET: ingame-avatars
      INGAME_AVATAR_STORAGE_ENDPOINT_URL: http://minio:9000
      INGAME_AVATAR_STORAGE_UPLOAD_BASE_URL: http://localhost:9000
      INGAME_AVATAR_STORAGE_ACCESS_KEY_ID: ingame
      INGAME_AVATAR_STORAGE_SECRET_ACCESS_KEY: ingame-dev-secret
      INGAME_AVATAR_STORAGE_PUBLIC_BASE_URL: http://localhost:9000/ingame-avatars
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    image: ghcr.io/kounex/ingame-web:local
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        INGAME_API_BASE_URL: http://localhost:8000/api/v1
        INGAME_WEB_APP_BASE_URL: http://localhost:8080
        INGAME_INVITE_BASE_URL: http://localhost:8080
        DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
        APPLE_SERVICE_ID: com.kounex.ingame.web
    ports:
      - "8080:8080"
    depends_on:
      - api
    networks:
      default:
        aliases:
          - app

  marketing:
    image: ghcr.io/kounex/ingame-marketing:local
    build:
      context: .
      dockerfile: Dockerfile.marketing
      args:
        INGAME_MARKETING_SITE_URL: http://localhost:8081
        INGAME_WEB_APP_BASE_URL: http://localhost:8080
        INGAME_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "8081:8080"
    depends_on:
      - web

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ingame
      MINIO_ROOT_PASSWORD: ingame-dev-secret
      MINIO_API_CORS_ALLOW_ORIGIN: http://localhost:3000,http://localhost:8080
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT_URL: http://minio:9000
      MINIO_ROOT_USER: ingame
      MINIO_ROOT_PASSWORD: ingame-dev-secret
      MINIO_BUCKET: ingame-avatars
    volumes:
      - ./deploy/minio:/bootstrap:ro
    entrypoint: ["/bin/sh", "/bootstrap/bootstrap-minio.sh"]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ingame
      POSTGRES_PASSWORD: ingame
      POSTGRES_DB: ingame
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingame"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  minio-data:
