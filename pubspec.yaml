name: ingame
description: Social gaming coordination app - find time to play with friends.
publish_to: 'none'
version: 0.2.5+5

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^17.2.3

  # Networking
  dio: ^5.9.2
  web_socket_channel: ^3.0.3

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5

  # Auth
  flutter_web_auth_2: ^4.0.1
  sign_in_with_apple: ^6.1.4

  # UI
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  cue: ^0.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
  generate: true
