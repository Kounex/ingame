name: ingame
description: Social gaming coordination app - find time to play with friends.
publish_to: 'none'
version: 0.7.1+25

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.2.3

  # Networking
  dio: ^5.9.2
  web_socket_channel: ^3.0.3

  # Data models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Storage
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5

  # Auth
  flutter_web_auth_2: ^5.0.3
  sign_in_with_apple: ^8.1.0

  # UI
  cupertino_icons: ^1.0.9
  google_fonts: ^8.1.0
  cue: ^0.3.1
  intl: ^0.20.2
  image_picker: ^1.2.2
  mime: ^2.0.0
  file_selector: ^1.1.0
  extended_image: ^10.0.1
  image: ^4.9.1
  crypto: ^3.0.7
  url_launcher: ^6.3.2
  line_icons: ^2.0.3
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  url_launcher_platform_interface: ^2.3.2

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/ingame-logo.png
    - assets/images/ingame-logo-splash.png
    - assets/images/ingame-logo-splash-ios.png
  shaders:
    - shaders/ambient_background.frag

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/ingame-logo.png
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: '#0A0E1A'
  web:
    generate: true
    image_path: assets/images/ingame-logo.png
    background_color: '#0A0E1A'
    theme_color: '#0A0E1A'

flutter_native_splash:
  color: '#0A0E1A'
  image: assets/images/ingame-logo-splash.png
  image_ios: assets/images/ingame-logo-splash-ios.png
  android: true
  ios: true
  ios_content_mode: scaleAspectFit
  web: false
  android_12:
    color: '#0A0E1A'
    image: assets/images/ingame-logo-splash.png
