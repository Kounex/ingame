apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ingame-staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: ingame-api
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ingame-api
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: ingame-api
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"

  - target:
      kind: Deployment
      name: ingame-web
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ingame-web
      spec:
        replicas: 2
        template:
          spec:
            containers:
              - name: ingame-web
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "256Mi"
                    cpu: "250m"

  - target:
      kind: ConfigMap
      name: ingame-api
    patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ingame-api
      data:
        INGAME_DEBUG: "false"
        INGAME_CORS_ALLOW_ORIGINS: "https://staging.in-game.app"
        INGAME_LOG_LEVEL: "info"

  - target:
      kind: Route
      name: ingame-api
    patch: |
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: ingame-api
      spec:
        host: staging-api.in-game.app

  - target:
      kind: Route
      name: ingame-web
    patch: |
      apiVersion: route.openshift.io/v1
      kind: Route
      metadata:
        name: ingame-web
      spec:
        host: staging.in-game.app
