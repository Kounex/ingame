apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests are rendered from the Helm charts.
# Generate them with:
#   helm template ingame-api ../helm/ingame-api -f ../helm/ingame-api/values.yaml > base/api.yaml
#   helm template ingame-web ../helm/ingame-web -f ../helm/ingame-web/values.yaml > base/web.yaml
# Then list the output file(s) here.

resources: []
# - api.yaml
# - web.yaml

# Alternatively, use the Helm chart inflator (Kustomize 4.1+):
# helmCharts:
#   - name: ingame-api
#     releaseName: ingame-api
#     valuesFile: ../../helm/ingame-api/values.yaml
#     version: 0.1.0
#   - name: ingame-web
#     releaseName: ingame-web
#     valuesFile: ../../helm/ingame-web/values.yaml
#     version: 0.1.0

commonLabels:
  app.kubernetes.io/part-of: ingame

namespace: ingame
