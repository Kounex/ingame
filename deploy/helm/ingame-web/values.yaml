replicaCount: 1

image:
  repository: ghcr.io/kounex/ingame-web
  tag: 0.3.8
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

route:
  enabled: true
  host: ""
  path: /
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
