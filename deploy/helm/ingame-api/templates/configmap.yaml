apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ingame-api.fullname" . }}
  labels:
    {{- include "ingame-api.labels" . | nindent 4 }}
data:
  INGAME_DEBUG: {{ .Values.config.debug | quote }}
  INGAME_CORS_ALLOW_ORIGINS: {{ .Values.config.corsAllowOrigins | quote }}
  INGAME_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  INGAME_API_PREFIX: {{ .Values.config.apiPrefix | quote }}
