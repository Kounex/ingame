{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ingame-api.webFullname" . }}
  labels:
    {{- include "ingame-api.webLabels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ingame-api.webSelectorLabels" . | nindent 4 }}
{{- end }}
