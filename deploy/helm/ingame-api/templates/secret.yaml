apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ingame-api.fullname" . }}
  labels:
    {{- include "ingame-api.labels" . | nindent 4 }}
  annotations:
    # In production, replace this Secret with SealedSecrets or ExternalSecrets.
    # These placeholder values exist only for chart validation / dry-run.
    helm.sh/hook: ""
type: Opaque
data:
  database-url: {{ .Values.secrets.databaseUrl }}
  redis-url: {{ .Values.secrets.redisUrl }}
  jwt-secret: {{ .Values.secrets.jwtSecret }}
  steam-api-key: {{ .Values.secrets.steamApiKey }}
