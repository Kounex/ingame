apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ingame-api.fullname" . }}
  labels:
    {{- include "ingame-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ingame-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ingame-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: INGAME_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: database-url
            - name: INGAME_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: redis-url
            - name: INGAME_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: jwt-secret
            - name: INGAME_STEAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: steam-api-key
            - name: INGAME_AVATAR_STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: avatar-storage-bucket
            - name: INGAME_AVATAR_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: avatar-storage-access-key-id
            - name: INGAME_AVATAR_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ingame-api.fullname" . }}
                  key: avatar-storage-secret-access-key
          envFrom:
            - configMapRef:
                name: {{ include "ingame-api.fullname" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
