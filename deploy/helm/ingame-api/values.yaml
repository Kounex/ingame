replicaCount: 1

image:
  repository: ghcr.io/kounex/ingame-api
  tag: 0.5.1
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

# OpenShift Route (instead of Ingress)
route:
  enabled: true
  host: ""
  path: /
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

ingress:
  enabled: false

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# -- Non-secret configuration injected via ConfigMap
config:
  debug: "false"
  corsAllowOrigins: "https://app.in-game.app"
  logLevel: "info"
  apiPrefix: "/api/v1"
  avatarStorageRegion: "auto"
  avatarStorageEndpointUrl: ""
  # Optional browser-facing upload origin. Set this when the API can reach the
  # S3-compatible endpoint on an internal host but Flutter/web must upload to a
  # different public host.
  avatarStorageUploadBaseUrl: ""
  # Required for release deployments that should support avatar uploads.
  # Leave empty only if the environment intentionally accepts upload-init returning
  # `user.avatar_upload_unavailable` until storage is provisioned.
  avatarStoragePublicBaseUrl: ""
  avatarUploadMaxFileSizeBytes: "2097152"
  avatarUploadPresignExpiresSeconds: "300"

# -- Secret references; actual values come from SealedSecrets / ExternalSecrets.
# Avatar upload support requires the storage bucket/access credentials below plus
# a non-empty `config.avatarStoragePublicBaseUrl`.
# The placeholder values below are base64-encoded "CHANGEME".
secrets:
  databaseUrl: "Q0hBTkdFTUU="       # postgresql+asyncpg://...
  redisUrl: "Q0hBTkdFTUU="           # redis://...
  jwtSecret: "Q0hBTkdFTUU="
  steamApiKey: "Q0hBTkdFTUU="
  avatarStorageBucket: "Q0hBTkdFTUU="
  avatarStorageAccessKeyId: "Q0hBTkdFTUU="
  avatarStorageSecretAccessKey: "Q0hBTkdFTUU="

# External PostgreSQL / Redis (when not using subcharts)
postgresql:
  enabled: true
  host: ingame-postgresql
  port: 5432
  database: ingame

redis:
  enabled: true
  host: ingame-redis
  port: 6379

# Health probes target FastAPI's /health endpoint.
# NOTE: ensure your FastAPI app exposes GET /health returning 200.
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
