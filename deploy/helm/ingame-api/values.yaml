replicaCount: 1

image:
  repository: ghcr.io/kounex/ingame-api
  tag: 0.3.1
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

# OpenShift Route (instead of Ingress)
route:
  enabled: true
  host: ""
  path: /
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

ingress:
  enabled: false

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

# -- Non-secret configuration injected via ConfigMap
config:
  debug: "false"
  corsAllowOrigins: "https://app.in-game.app"
  logLevel: "info"
  apiPrefix: "/api/v1"

# -- Secret references; actual values come from SealedSecrets / ExternalSecrets.
# The placeholder values below are base64-encoded "CHANGEME".
secrets:
  databaseUrl: "Q0hBTkdFTUU="       # postgresql+asyncpg://...
  redisUrl: "Q0hBTkdFTUU="           # redis://...
  jwtSecret: "Q0hBTkdFTUU="
  steamApiKey: "Q0hBTkdFTUU="

# External PostgreSQL / Redis (when not using subcharts)
postgresql:
  enabled: true
  host: ingame-postgresql
  port: 5432
  database: ingame

redis:
  enabled: true
  host: ingame-redis
  port: 6379

# Health probes target FastAPI's /health endpoint.
# NOTE: ensure your FastAPI app exposes GET /health returning 200.
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
